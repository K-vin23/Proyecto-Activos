name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KAICERPIRATA_PROYECTO_ACTIVOS }}
          channelId: live
          projectId: 1:830702974119:web:6b47b016ae7f05dca79782 # <-- MUY IMPORTANTE: Es probable que este no sea el ID de proyecto correcto. Verifícalo en la consola de Firebase.
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
